apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/seongminj0613-tech/gitops-demo.git
    targetRevision: main
    path: apps/redis

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
